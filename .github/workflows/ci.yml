name: SidePilot CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: SidePilot/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: SidePilot

    - name: Lint
      run: npm run lint
      working-directory: SidePilot
      continue-on-error: true

    - name: Type Check
      run: npx tsc --noEmit
      working-directory: SidePilot

    - name: Run Tests
      run: npm test
      working-directory: SidePilot

    - name: Build Extension
      run: npm run build
      working-directory: SidePilot

    - name: Archive Extension Build
      uses: actions/upload-artifact@v4
      with:
        name: sidepilot-extension
        path: SidePilot/dist/
